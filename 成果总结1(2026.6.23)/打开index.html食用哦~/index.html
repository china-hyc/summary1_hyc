<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML+CSS学习总结</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f4f7ff 0%, #dfe9f3 100%);
            color: #233042;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page {
            width: min(1100px, 100%);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(35, 48, 66, 0.16);
            padding: 48px 40px 40px;
        }

        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        .hero h1 {
            font-size: 2.2rem;
            margin: 0 0 16px;
            color: #1f2c43;
        }

        .hero p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #4f5f75;
            max-width: 760px;
            margin: 0 auto;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 24px 0 32px;
        }

        .card {
            background: linear-gradient(145deg, #ffffff, #f4f8ff);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 28px rgba(31, 44, 67, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(31, 44, 67, 0.14);
        }

        .card h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            color: #2c4e7b;
        }

        .card p {
            margin: 0 0 16px;
            color: #55657a;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .card a {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(90deg, #4a90e2, #6c63ff);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.95rem;
        }

        .card a:hover {
            opacity: 0.92;
        }

        .footer {
            text-align: center;
            font-size: 1rem;
            color: #35506b;
            margin-top: 24px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        @media (max-width: 900px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>欢迎来到我的第一个学习总结小站</h1>
            <p>我刚刚开始接触编程，正在一步一步学习成长。通过这段时间的练习，我已经完成了 HTML 和 CSS 的基础学习，感受到了网页设计的乐趣，也慢慢学会用代码把想法变成页面。</p>
            <p>下面是一些我挑出来的、完成得比较好的练习和项目：</p>
        </div>

        <div class="cards">
            <div class="card">
                <h1>01</h1>
                <p>html大总结：一份朴实无华的表格和表单</p>
                <a href="06_html大总结.html">go!</a>
            </div>
            <div class="card">
                <h1>02</h1>
                <p>带上一点点的CSS：一个没有图片的网页架构，页面充满了定位的味道</p>
                <a href="15_css9.html">go!</a>
            </div>
            <div class="card">
                <h1>03</h1>
                <p>学完后的一个奇思妙想：学javascript前的一个小小的交互式图片，你会碰它吗？</p>
                <a href="好玩的.html">go!</a>
            </div>
        </div>

        <div class="footer">继续进军JavaScript和Java，未来的每一步都会让自己变得更棒！</div>
    </div>
</body>
</html>
